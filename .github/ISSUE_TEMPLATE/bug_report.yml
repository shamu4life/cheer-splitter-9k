name: Bug report
description: Something is broken or behaving incorrectly
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear, concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What should have happened?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the app is affected?
      options:
        - Prose mode (sentence splitting)
        - Script mode (NAME: speaker parsing)
        - Replacements (find/replace)
        - Chunking / packing (size cap, voice switches)
        - Output / copy buttons
        - Theme (Auto/Light/Dark)
        - Web UI / layout
        - Other / not sure
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser & version
      placeholder: "e.g. Chrome 124, Safari 17.4, Firefox 125"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS & version
      placeholder: "e.g. iOS 17.4, Android 15, macOS 14.4, Windows 11"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Console errors, the exact input text that misformatted, the options you used (mode, max chars, switch cap), screenshots or screen recordings — anything that helps.
    validations:
      required: false
