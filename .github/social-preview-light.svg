<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <radialGradient id="glow" cx="50%" cy="39%" r="32%">
      <stop offset="0%" stop-color="#9146ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#9146ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bf94ff"/>
      <stop offset="100%" stop-color="#9146ff"/>
    </linearGradient>
  </defs>
  <!-- Light background -->
  <rect width="1280" height="640" fill="#f5f6f8"/>
  <!-- Subtle purple glow behind mark -->
  <rect width="1280" height="640" fill="url(#glow)"/>
  <!-- Brand mark: 45deg-rotated rounded square, gradient fill -->
  <rect x="590" y="180" width="100" height="100" rx="22" fill="url(#mark)" transform="rotate(45 640 250)"/>
  <!-- Wordmark (dark — for light backgrounds) -->
  <text x="640" y="415" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-weight="900" font-size="92" text-anchor="middle" letter-spacing="-3"><tspan fill="#17171b">Voice</tspan><tspan fill="#6d28d9"> Chunker</tspan></text>
  <!-- Tagline -->
  <text x="640" y="462" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-weight="400" font-size="26" fill="#54545f" text-anchor="middle">Paste text, get tidy size-capped chunks.</text>
  <!-- URL -->
  <text x="640" y="506" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-weight="600" font-size="20" fill="#6d28d9" text-anchor="middle" letter-spacing="1">annoy.uwutoowo.com</text>
  <!-- Purple accent bar -->
  <rect x="0" y="628" width="1280" height="3" fill="#6d28d9" opacity="0.7"/>
</svg>
